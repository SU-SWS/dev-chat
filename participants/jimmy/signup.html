<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    background: #fff;
    border-radius: 14px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    padding: 32px;
    width: 100%;
    max-width: 440px;
  }
  h1 { margin: 0 0 4px; font-size: 24px; }
  .sub { color: #666; font-size: 14px; margin-bottom: 24px; }
  label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #333; }
  input {
    width: 100%;
    padding: 10px 12px;
    font-size: 15px;
    border: 1px solid #ccc;
    border-radius: 8px;
    margin-bottom: 16px;
    font-family: inherit;
  }
  input:focus { outline: 2px solid #667eea; border-color: transparent; }
  button {
    width: 100%;
    padding: 12px;
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    background: #667eea;
    border: none;
    border-radius: 8px;
    cursor: pointer;
  }
  button:disabled { background: #bbb; cursor: not-allowed; }
  ul.rules { list-style: none; padding: 0; margin: 0 0 16px; font-size: 13px; }
  ul.rules li {
    padding: 6px 8px;
    margin-bottom: 4px;
    border-radius: 6px;
    background: #f5f5f7;
    color: #555;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  ul.rules li.ok { background: #e7f7ec; color: #1f7a3a; }
  ul.rules li::before { content: "○"; font-weight: 700; }
  ul.rules li.ok::before { content: "✓"; }
  .banner {
    padding: 10px 12px;
    border-radius: 8px;
    margin-bottom: 16px;
    font-size: 13px;
    display: none;
  }
  .banner.ok { display: block; background: #e7f7ec; color: #1f7a3a; }
  .banner.err { display: block; background: #fdecea; color: #a8341c; }
</style>
</head>
<body>
  <form class="card" id="form" autocomplete="off">
    <h1>Sign in</h1>
    <div class="sub">Welcome back. Please verify you are a real human.</div>

    <label for="username">Username</label>
    <input id="username" type="text" placeholder="your-handle" required>

    <label for="password">Password</label>
    <input id="password" type="text" placeholder="enter password" required>

    <ul class="rules" id="rules">
      <li data-rule="weekday">Must contain today's day of the week, spelled backwards</li>
      <li data-rule="chess">Must contain a chess opening move (e.g. e4, Nf3)</li>
      <li data-rule="emoji">Must contain exactly one emoji, and it must be a fruit 🍎</li>
    </ul>

    <div class="banner" id="banner"></div>
    <button id="submit" type="submit" disabled>Sign in</button>
  </form>

<script>
  const pwd = document.getElementById('password');
  const rulesEl = document.getElementById('rules');
  const submit = document.getElementById('submit');
  const banner = document.getElementById('banner');

  const FRUIT_EMOJI = ['🍎','🍏','🍐','🍊','🍋','🍌','🍉','🍇','🍓','🫐','🍈','🍒','🍑','🥭','🍍','🥥','🥝','🍅'];
  const EMOJI_RE = /\p{Extended_Pictographic}/gu;
  const CHESS = ['e4','d4','c4','Nf3','Nc3','Bb5','Bc4','e5','d5','c5','Nf6','Nc6','g6','b6'];

  function emojiCheck(s) {
    const matches = s.match(EMOJI_RE) || [];
    if (matches.length !== 1) return false;
    return FRUIT_EMOJI.includes(matches[0]);
  }

  function hasChessMove(s) {
    return CHESS.some(m => s.includes(m));
  }

  function reverseDayCheck(s) {
    const day = new Date().toLocaleDateString('en-US', { weekday:'long' });
    const reversed = day.split('').reverse().join('').toLowerCase();
    return s.toLowerCase().includes(reversed);
  }

  const CHECKS = {
    weekday: reverseDayCheck,
    chess: hasChessMove,
    emoji: emojiCheck,
  };

  function update() {
    const val = pwd.value;
    let allPass = val.length > 0;
    for (const li of rulesEl.querySelectorAll('li')) {
      const rule = li.dataset.rule;
      const passed = CHECKS[rule](val);
      li.classList.toggle('ok', passed);
      if (!passed) allPass = false;
    }
    submit.disabled = !allPass;
    if (allPass) {
      banner.className = 'banner ok';
      banner.textContent = 'Incredible. You may now sign in.';
    } else {
      banner.className = 'banner';
      banner.textContent = '';
    }
  }

  pwd.addEventListener('input', update);

  let dodges = 0;
  const TAUNTS = [
    'Not so fast.',
    'Try again.',
    'Almost!',
    'Are you sure you want to sign in?',
    'One more time…',
  ];
  submit.style.transition = 'transform 0.25s cubic-bezier(.22,1.61,.36,1)';

  submit.addEventListener('click', e => {
    if (submit.disabled) return;
    if (dodges < 5) {
      e.preventDefault();
      const rect = submit.getBoundingClientRect();
      const margin = 20;
      const maxX = window.innerWidth - rect.width - margin;
      const maxY = window.innerHeight - rect.height - margin;
      const baseX = rect.left - (parseFloat(submit.dataset.tx) || 0);
      const baseY = rect.top - (parseFloat(submit.dataset.ty) || 0);
      const tx = Math.random() * (maxX - margin) + margin - baseX;
      const ty = Math.random() * (maxY - margin) + margin - baseY;
      submit.dataset.tx = tx;
      submit.dataset.ty = ty;
      submit.style.position = 'relative';
      submit.style.zIndex = '10';
      submit.style.transform = `translate(${tx}px, ${ty}px)`;
      submit.textContent = TAUNTS[dodges];
      dodges++;
    } else {
      submit.style.transform = '';
      submit.textContent = 'Sign in';
    }
  });

  document.getElementById('form').addEventListener('submit', e => {
    e.preventDefault();
    if (dodges < 5) return;
    banner.className = 'banner ok';
    banner.textContent = '✓ Authenticated. Welcome, Champion of Bureaucracy.';
  });

  update();
</script>
</body>
</html>
